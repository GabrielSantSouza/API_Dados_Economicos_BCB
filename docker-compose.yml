services:
  mysql_db:
    image: mysql:8.0
    container_name: bcb_mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: bcb_dados
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis_cache:
    image: redis:alpine
    container_name: bcb_redis
    ports:
      - "6379:6379"

volumes:
  mysql_data: